<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover + safe-area для красивого вида на iPhone с "чёлкой" -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Salmon">
  <title>Salmon — Складской учёт</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ───────── Шапка ───────── -->
  <header class="topbar" id="topbar" hidden>
    <div class="topbar__title">
      <span class="logo">🐟</span>
      <span>Salmon</span>
    </div>
    <div class="topbar__right">
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn-icon" id="btnLogout" title="Выйти" aria-label="Выйти">⎋</button>
    </div>
  </header>

  <main class="container">

    <!-- ───────── ЭКРАН ВХОДА ───────── -->
    <section id="loginScreen" class="screen">
      <div class="card login-card">
        <div class="login-hero">
          <div class="login-logo">🐟</div>
          <h1>Salmon</h1>
          <p class="muted">Складской учёт и продажи</p>
        </div>

        <label class="field">
          <span class="field__label">Токен доступа</span>
          <input type="password" id="tokenInput" inputmode="text" autocomplete="off"
                 placeholder="Введите ваш токен" autocapitalize="off" spellcheck="false">
        </label>

        <button class="btn btn--primary" id="btnLogin">Войти</button>

        <p class="error" id="loginError" hidden></p>
        <p class="muted small center">Токен выдаёт администратор. Он сохраняется только на этом устройстве.</p>
      </div>
    </section>

    <!-- ───────── ЭКРАН ПРИЛОЖЕНИЯ ───────── -->
    <section id="appScreen" class="screen" hidden>

      <!-- Форма ввода продажи (только для admin) -->
      <div class="card" id="formCard" hidden>
        <h2 class="card__title">Новая продажа</h2>

        <div class="grid2">
          <label class="field">
            <span class="field__label">Дата</span>
            <input type="date" id="fDate">
          </label>
          <label class="field">
            <span class="field__label">Кол-во</span>
            <input type="number" id="fQty" inputmode="decimal" min="0" step="any" value="1">
          </label>
        </div>

        <label class="field">
          <span class="field__label">Товар</span>
          <select id="fSku"><option value="">— выберите товар —</option></select>
        </label>

        <div class="grid3">
          <label class="field">
            <span class="field__label">Цена</span>
            <input type="number" id="fPrice" inputmode="decimal" min="0" step="any" placeholder="0">
          </label>
          <label class="field">
            <span class="field__label">Скидка</span>
            <input type="number" id="fDisc" inputmode="decimal" min="0" step="any" value="0">
          </label>
          <label class="field">
            <span class="field__label">Тип</span>
            <select id="fDiscType">
              <option value="Сумма">сум</option>
              <option value="%">%</option>
            </select>
          </label>
        </div>

        <div class="sum-row">
          <span>Итого к оплате</span>
          <span class="sum-row__val"><span id="fSum">0</span> ₽</span>
        </div>

        <label class="field">
          <span class="field__label">Клиент</span>
          <input type="text" id="fClient" placeholder="Розничный покупатель" list="clientList">
          <datalist id="clientList"></datalist>
        </label>

        <label class="toggle">
          <input type="checkbox" id="fDebt">
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
          <span>Продажа в долг</span>
        </label>

        <label class="field" id="payField">
          <span class="field__label">Оплата на счёт</span>
          <select id="fPay"></select>
        </label>

        <button class="btn btn--primary" id="btnSubmit">Отправить</button>
        <p class="status" id="submitStatus" hidden></p>
      </div>

      <!-- Блок данных (обе роли) -->
      <div class="card">
        <div class="card__head">
          <h2 class="card__title">Продажи</h2>
          <button class="btn btn--ghost" id="btnLoad">Загрузить</button>
        </div>

        <div class="summary" id="summary" hidden>
          <div class="summary__item">
            <span class="summary__val" id="sumCount">0</span>
            <span class="summary__lbl">записей</span>
          </div>
          <div class="summary__item">
            <span class="summary__val" id="sumTotal">0</span>
            <span class="summary__lbl">выручка</span>
          </div>
        </div>

        <p class="status" id="loadStatus" hidden></p>
        <div id="dataList" class="data-list"></div>
      </div>

    </section>
  </main>

  <!-- Лёгкий тост для уведомлений -->
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
