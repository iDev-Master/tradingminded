<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f766e" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- "black" reserves the status-bar area so content never sits under the
       iPhone clock/signal (black-translucent let content slide underneath). -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Salmon">
  <title>Salmon</title>

  <!-- Browser-tab favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" sizes="any" href="icons/icon-192.png">

  <!-- Static fallback manifest. app.js replaces it at runtime with a
       per-client manifest so installed PWAs keep the ?client= param. -->
  <link rel="manifest" href="manifest.json" id="manifestLink">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fatal screen: shown when ?client= is missing or unknown. -->
  <section id="fatalScreen" class="screen fatal" hidden>
    <div class="card center">
      <div class="login-logo">🐟</div>
      <h1 id="fatalTitle">Клиент не найден</h1>
      <p class="muted" id="fatalText"></p>
    </div>
  </section>

  <!-- Top bar (visible after login) -->
  <header class="topbar" id="topbar" hidden>
    <div class="topbar__title">
      <span class="logo">🐟</span>
      <span id="topTitle">Salmon</span>
    </div>
    <div class="topbar__right">
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn-icon" id="btnLogout" title="Выйти" aria-label="Выйти">⎋</button>
    </div>
  </header>

  <main class="container">

    <!-- ───────── LOGIN ───────── -->
    <section id="loginScreen" class="screen" hidden>
      <div class="card login-card">
        <div class="login-hero">
          <div class="login-logo">🐟</div>
          <h1 id="loginClientName">Salmon</h1>
          <p class="muted">Складской учёт и продажи</p>
        </div>

        <label class="field">
          <span class="field__label">Токен доступа</span>
          <input type="password" id="tokenInput" inputmode="text" autocomplete="off"
                 placeholder="Введите ваш токен" autocapitalize="off" spellcheck="false">
        </label>

        <button class="btn btn--primary" id="btnLogin">Войти</button>

        <p class="error" id="loginError" hidden></p>
        <p class="muted small center">Токен выдаёт администратор. Он сохраняется только на этом устройстве.</p>
      </div>
    </section>

    <!-- ───────── ПРОДАТЬ ───────── -->
    <section id="sellScreen" class="screen" hidden>
      <div class="card">
        <label class="field" style="margin-bottom:8px">
          <span class="field__label">Штрихкод / артикул / название</span>
          <input type="text" id="sellSearch" inputmode="search" autocomplete="off"
                 autocapitalize="off" spellcheck="false" placeholder="Сканируйте или начните вводить…">
        </label>
        <div id="sellResults" class="search-results" hidden></div>
      </div>

      <div class="card" id="sellCartCard">
        <h2 class="card__title">Корзина <span class="pill" id="sellCount">0</span></h2>
        <div id="sellCart" class="cart"></div>

        <label class="field">
          <span class="field__label">Клиент</span>
          <input type="text" id="sellClient" autocomplete="off" placeholder="Розничный покупатель">
        </label>
        <label class="field">
          <span class="field__label">Оплата</span>
          <select id="sellPayment"></select>
        </label>

        <div class="sum-row">
          <span>Итого</span>
          <span class="sum-row__val" id="sellTotal">0,00</span>
        </div>
        <button class="btn btn--primary" id="btnSellSubmit">Сохранить продажу</button>
        <p class="status" id="sellStatus" hidden></p>
      </div>
    </section>

    <!-- ───────── КУПИТЬ (приход) ───────── -->
    <section id="buyScreen" class="screen" hidden>
      <div class="card">
        <label class="field" style="margin-bottom:8px">
          <span class="field__label">Штрихкод / артикул / название</span>
          <input type="text" id="buySearch" inputmode="search" autocomplete="off"
                 autocapitalize="off" spellcheck="false" placeholder="Найдите товар для прихода…">
        </label>
        <div id="buyResults" class="search-results" hidden></div>
      </div>

      <div class="card" id="buyCartCard">
        <h2 class="card__title">Приход <span class="pill" id="buyCount">0</span></h2>
        <div id="buyCart" class="cart"></div>

        <label class="field">
          <span class="field__label">Поставщик</span>
          <input type="text" id="buySupplier" autocomplete="off" list="supplierList" placeholder="Поставщик">
          <datalist id="supplierList"></datalist>
        </label>
        <label class="field">
          <span class="field__label">Оплата</span>
          <select id="buyPayment"></select>
        </label>

        <div class="sum-row">
          <span>Итого приход</span>
          <span class="sum-row__val" id="buyTotal">0,00</span>
        </div>
        <button class="btn btn--primary" id="btnBuySubmit">Сохранить приход</button>
        <p class="status" id="buyStatus" hidden></p>
      </div>
    </section>

    <!-- ───────── Generic data screen (Касса / Склад / Дашборды / История) ───────── -->
    <section id="dataScreen" class="screen" hidden>
      <div class="card">
        <div class="card__head">
          <h2 class="card__title" id="dataTitle">Данные</h2>
          <button class="btn btn--ghost" id="btnReload">↻</button>
        </div>
        <div class="summary" id="dataSummary" hidden></div>
        <p class="status" id="dataStatus" hidden></p>
        <div id="dataList" class="data-list"></div>
      </div>
    </section>

  </main>

  <!-- Bottom tab bar: primary navigation (built by app.js per role). -->
  <nav class="tabbar" id="tabbar" hidden></nav>

  <!-- Install button: shown only when the browser fires
       beforeinstallprompt (PWA installable & not yet installed). -->
  <button id="btnInstall" class="btn-install" hidden>⬇️ Установить приложение</button>

  <div id="toast" class="toast" hidden></div>

  <!-- Single, client-agnostic application script -->
  <script src="app.js"></script>
</body>
</html>
